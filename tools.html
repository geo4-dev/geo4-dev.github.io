<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Tools - Geo4Dev</title><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"><link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"><link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"><link rel="stylesheet" href="css/style.css"></head><body><nav class="navbar navbar-expand-lg navbar-dark fixed-top"><div class="container"><a class="navbar-brand" href="index.html"><span class="brand-geo">Geo</span><span class="brand-4">4</span><span class="brand-dev">Dev</span></a><button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button><div class="collapse navbar-collapse" id="navbarNav"><ul class="navbar-nav ms-auto"><li class="nav-item"><a class="nav-link" href="index.html">Home</a></li><li class="nav-item"><a class="nav-link" href="about.html">About</a></li><li class="nav-item"><a class="nav-link active" href="tools.html">Tools</a></li><li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li></ul></div></div></nav><header class="page-header"><div class="container"><h1 class="display-5 fw-bold">Geographic Publication Browser</h1><p class="lead mb-0">Browse publications by location</p></div></header><section class="py-5"><div class="container"><p>Each publication is geotagged based on the study area location.</p><div id="mapid"></div></div></section><footer class="py-4 bg-dark text-white"><div class="container"><p class="text-center text-muted mt-3 mb-0 small">Website powered by New Light Technologies</p></div></footer><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script><script>var mymap=L.map('mapid').setView([11.58,37.42],3);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'OpenStreetMap contributors',maxZoom:18}).addTo(mymap);fetch('data/publications.json').then(r=>r.json()).then(data=>{var mcg=L.markerClusterGroup();data.forEach(item=>{if(item.lat&&item.lng){var marker=L.marker([item.lat,item.lng]).bindPopup('<h6>'+item.title+'</h6><p><strong>Author:</strong> '+item.author+'</p><p><strong>Location:</strong> '+item.region+', '+item.country+'</p><p><strong>Category:</strong> '+item.category+'</p>');mcg.addLayer(marker);}});mcg.addTo(mymap);}).catch(()=>{});L.control.scale().addTo(mymap);</script></body></html>>
